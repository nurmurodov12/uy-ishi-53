<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore - Apple Expreince</title>
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="style.css">

<body>
    <!-- header section -->
    <div class="container h-auto m-auto">
        <div class="w-[100%] h-auto relative" id="header">
            <div class="flex justify-between items-center w-[100%] bg-[#ffffffb3] backdrop-blur-lg px-20 py-4 fixed z-50 border-b-1"

                <div id="nav-center" class="w-[30%]">

                        </li>
                        <li>

                        </li>
                        <li>

                        </li>
                        <li>
                            <a href="#">iPhone</a>
                        </li>
                        <li>

                        </li>

                            <a href="#">Support</a>
                        </li>
                    </ul>
                </div>

                <div id="nav-right" class="w-[30%] pl-[160px] flex items-center gap-4">
                    <i class="fa-solid fa-moon cursor-pointer" id="darkmode"></i>
                    <button class="bg-black text-white  text-[11px] rounded-2xl py-1 cursor-pointer w-[70px]">
                        <a href="admin.html" class="cursor-pointer" id="admin-btn">Admin</a>
                    </button>
                </div>
            </div>

            <div id="header-main" class="w-[100%] pt-[50px]  flex flex-col items-center ">
                <div id="header-main-title">
                    <h1 id="header-main-title-h1" class="text-[56px] font-semibold pt-10">iPhone 15 Pro</h1>
                    <p id="header-main-subtitle" class="font-normal text-[28px]">Titan. Kuchli. Professional.</p>
                    <div class="flex items-center gap-5 pt-3 justify-center">
                        <a href="" class="flex items-center  text-[#0071e3]">
                            <p id="header-learn" class="text-[19px] font-normal ">Batafsil ma'lumot</p>
                            <i class="fa-solid fa-chevron-down rotate-[270deg]"></i>
                        </a>

                        <a href="" class="flex items-center  text-[#0071e3] ">
                            <p id="header-learn" class="text-[19px] font-normal ">Sotib olish</p>
                            <i class="fa-solid fa-chevron-down rotate-[270deg]"></i>
                        </a>
                    </div>
                </div>

                <div class="pt-[50px]" id="header-main-img">
                    <img class="w-[990px]" src="./image/image.png" alt="">
                </div>
            </div>
        </div>

    </div>
    <!-- /header section -->

    <!-- main section -->
    <div class="container">
        <div class="flex flex-col px-[200px]  py-10 w-[100%] h-auto" id="main">
            <h2 class="font-semibold text-[32px] pl-10">Yangi kelganlar.</h2>

            <div class="" id="products">

            </div>
        </div>
    </div>
    <!-- /main section -->

    <!-- footer section -->
    <div class="container">
        <div class="flex flex-col items-center w-[100%] py-[70px] border-t-1 b" id="footer">
            <p class="font-normal text-[12px] text-[#575758]">Copyright © 2026 iStore Uzbekistan. Barcha huquqlar

            <p class="font-normal text-[12px] text-[#6e6e73] pt-3">O'zbekiston | Maxfiylik siyosati | Sayt xaritasi</p>
